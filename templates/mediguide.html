<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MedGuide — Medical Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css"/>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e28;
      --surface3: #212636;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --accent: #4ade9a;
      --accent2: #3bc47f;
      --accent-glow: rgba(74,222,154,0.15);
      --accent-dim: rgba(74,222,154,0.08);
      --user-bubble: #2563eb;
      --user-bubble2: #1d4ed8;
      --text: #e8eaf0;
      --text2: #9ca3b0;
      --text3: #5a6070;
      --radius: 20px;
      --radius-sm: 12px;
      --shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(74,222,154,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(ellipse, rgba(37,99,235,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 16px;
    }

    .chat-window {
      width: 100%;
      max-width: 720px;
      height: min(88vh, 820px);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow), 0 0 0 1px rgba(74,222,154,0.03) inset;
      overflow: hidden;
      animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Header */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, #1a3a2a, #0d2016);
      border: 1px solid rgba(74,222,154,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .status-dot {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      border: 2px solid var(--surface2);
      animation: pulse-dot 2.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,154,0.4); }
      50% { box-shadow: 0 0 0 4px rgba(74,222,154,0); }
    }

    .header-info { flex: 1; }
    .header-name {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      color: var(--text);
      letter-spacing: 0.01em;
      line-height: 1.2;
    }
    .header-sub {
      font-size: 12px;
      color: var(--accent);
      font-weight: 400;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .header-sub::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-badge {
      font-size: 11px;
      padding: 4px 10px;
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 20px;
      border: 1px solid rgba(74,222,154,0.15);
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

    /* Date divider */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0 16px;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .date-divider span {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Welcome message */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 24px;
      text-align: center;
      gap: 10px;
    }
    .welcome-icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(135deg, #1a3a2a, #0d2016);
      border: 1px solid rgba(74,222,154,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 4px;
    }
    .welcome h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--text);
    }
    .welcome p {
      font-size: 13px;
      color: var(--text2);
      max-width: 300px;
      line-height: 1.6;
    }
    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .chip {
      font-size: 12px;
      padding: 6px 14px;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 20px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover {
      background: var(--accent-dim);
      border-color: rgba(74,222,154,0.25);
      color: var(--accent);
    }

    /* Message rows */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      margin-bottom: 10px;
      animation: msgIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .msg-avatar.bot {
      background: linear-gradient(135deg, #1a3a2a, #0d2016);
      border: 1px solid rgba(74,222,154,0.2);
    }
    .msg-avatar.user-av {
      background: linear-gradient(135deg, #1e3a7a, #0d1f4a);
      border: 1px solid rgba(37,99,235,0.25);
    }

    .msg-content { max-width: 72%; display: flex; flex-direction: column; gap: 4px; }
    .msg-row.user .msg-content { align-items: flex-end; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
      word-wrap: break-word;
    }
    .bubble.bot {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      color: var(--text);
    }
    .bubble.user {
      background: var(--user-bubble);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom-right-radius: 5px;
      color: #fff;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text3);
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing-row { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 10px; }
    .typing-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .dot {
      width: 6px; height: 6px;
      background: var(--text3);
      border-radius: 50%;
      animation: typing 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Footer / Input */
    .chat-footer {
      padding: 16px 20px 20px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .disclaimer {
      font-size: 10px;
      color: var(--text3);
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 10px 10px 10px 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-row:focus-within {
      border-color: rgba(74,222,154,0.3);
      box-shadow: 0 0 0 3px rgba(74,222,154,0.06);
    }

    #text {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      min-height: 22px;
      max-height: 120px;
      overflow-y: auto;
    }
    #text::placeholder { color: var(--text3); }
    #text::-webkit-scrollbar { width: 3px; }
    #text::-webkit-scrollbar-thumb { background: var(--surface3); }

    #send {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
    #send:hover { background: var(--accent2); transform: scale(1.05); }
    #send:active { transform: scale(0.96); }
    #send svg { width: 16px; height: 16px; fill: #0d0f14; }

    /* Responsive */
    @media (max-width: 600px) {
      .app { padding: 0; align-items: flex-end; }
      .chat-window {
        max-width: 100%;
        height: 100vh;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-bottom: none;
      }
      .messages { padding: 16px 14px; }
      .msg-content { max-width: 82%; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="chat-window">

    <!-- Header -->
    <div class="chat-header">
      <div class="avatar-wrap">
        <div class="avatar">🩺</div>
        <div class="status-dot"></div>
      </div>
      <div class="header-info">
        <div class="header-name">MedGuide Assistant</div>
        <div class="header-sub">Online · Ready to help</div>
      </div>
      <div class="header-badge">AI Medical</div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="date-divider"><span>Today</span></div>
      <div class="welcome">
        <div class="welcome-icon">🩺</div>
        <h2>How can I help you?</h2>
        <p>Ask me about symptoms, medications, conditions, or general health guidance.</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="chat-footer">
      <div class="disclaimer">⚕ For informational purposes only — not a substitute for professional medical advice</div>
      <form id="messageArea">
        <div class="input-row">
          <textarea id="text" name="msg" placeholder="Ask a medical question..." rows="1" required></textarea>
          <button type="submit" id="send">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </form>
    </div>

  </div>
</div>

<script>
  function getTime() {
    const d = new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function scrollToBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function appendUser(text) {
    const t = getTime();
    const html = `
      <div class="msg-row user">
        <div class="msg-avatar user-av">👤</div>
        <div class="msg-content">
          <div class="bubble user">${text}</div>
          <div class="msg-time">${t}</div>
        </div>
      </div>`;
    $('#messages').append(html);
    scrollToBottom();
  }

  function showTyping() {
    const html = `
      <div class="typing-row" id="typing">
        <div class="msg-avatar bot">🩺</div>
        <div class="typing-bubble">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>`;
    $('#messages').append(html);
    scrollToBottom();
  }

  function appendBot(text) {
    $('#typing').remove();
    const t = getTime();
    const html = `
      <div class="msg-row">
        <div class="msg-avatar bot">🩺</div>
        <div class="msg-content">
          <div class="bubble bot">${text}</div>
          <div class="msg-time">${t}</div>
        </div>
      </div>`;
    $('#messages').append(html);
    scrollToBottom();
  }

  function sendChip(el) {
    $('#text').val(el.textContent);
    $('#messageArea').submit();
  }

  // Auto-resize textarea
  $('#text').on('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // Enter to send (Shift+Enter for newline)
  $('#text').on('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      $('#messageArea').submit();
    }
  });

  $('#messageArea').on('submit', function(event) {
    event.preventDefault();
    const rawText = $('#text').val().trim();
    if (!rawText) return;

    // Remove welcome screen on first message
    $('.welcome').remove();

    $('#text').val('');
    $('#text').css('height', 'auto');

    appendUser(rawText);
    showTyping();

    $.ajax({
      data: { msg: rawText },
      type: 'POST',
      url: '/get',
    }).done(function(data) {
      appendBot(data);
    }).fail(function() {
      appendBot('Sorry, something went wrong. Please try again.');
    });
  });
</script>
</body>
</html>
